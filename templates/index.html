<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>tokenmaxxer — session history</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
          --bg:        #0a0a0b;
          --surface:   #111114;
          --border:    #1e1e24;
          --border2:   #2a2a35;
          --text:      #e8e8f0;
          --muted:     #5a5a72;
          --accent:    #7c6af7;
          --accent2:   #4fc3a1;
          --warn:      #e8624a;
          --warn-soft: rgba(232,98,74,0.12);
          --ok:        #4fc3a1;
          --mid:       #eab308;
          --mono:      'JetBrains Mono', monospace;
          --sans:      'Syne', sans-serif;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
          background: var(--bg);
          color: var(--text);
          font-family: var(--mono);
          font-size: 13px;
          min-height: 100vh;
          display: grid;
          grid-template-columns: 320px 1fr;
          grid-template-rows: 56px 1fr;
        }
        header {
          grid-column: 1/-1;
          background: var(--surface);
          border-bottom: 1px solid var(--border);
          display: flex;
          align-items: center;
          padding: 0 24px;
          gap: 16px;
        }
        .logo { font-family: var(--sans); font-weight: 800; font-size: 17px; letter-spacing: -0.5px; color: var(--text); }
        .logo span { color: var(--accent); }
        .header-stats { margin-left: auto; display: flex; gap: 24px; }
        .hstat { display: flex; flex-direction: column; align-items: flex-end; }
        .hstat-val { font-size: 14px; font-weight: 600; color: var(--accent2); }
        .hstat-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; }
        aside { background: var(--surface); border-right: 1px solid var(--border); overflow-y: auto; padding: 12px 0; }
        .aside-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); padding: 8px 16px 6px; }
        .session-item { padding: 10px 16px; cursor: pointer; border-left: 2px solid transparent; transition: background 0.1s, border-color 0.1s; }
        .session-item:hover { background: rgba(124,106,247,0.06); }
        .session-item.active { background: rgba(124,106,247,0.1); border-left-color: var(--accent); }
        .session-name { font-family: var(--sans); font-weight: 600; font-size: 13px; color: var(--text); margin-bottom: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .session-meta { display: flex; justify-content: space-between; align-items: center; }
        .session-tokens { color: var(--muted); font-size: 11px; }
        .session-date { color: var(--muted); font-size: 10px; }
        .pressure-dot { width: 6px; height: 6px; border-radius: 50%; display: inline-block; margin-right: 5px; vertical-align: middle; flex-shrink: 0; }
        main { overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 20px; }
        .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; color: var(--muted); gap: 8px; }
        .empty-state .big { font-size: 32px; }
        .card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
        .card-header { padding: 12px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
        .card-title { font-family: var(--sans); font-weight: 700; font-size: 12px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); }
        .card-body { padding: 16px; }
        .stat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
        .stat-box { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 14px 16px; }
        .stat-val { font-family: var(--sans); font-size: 22px; font-weight: 800; color: var(--text); line-height: 1; margin-bottom: 5px; }
        .stat-val.warn { color: var(--warn); }
        .stat-val.ok   { color: var(--ok); }
        .stat-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.07em; color: var(--muted); }
        .turns-chart { display: flex; align-items: flex-end; gap: 3px; height: 56px; padding: 0 2px; }
        .turn-bar { flex: 1; border-radius: 2px 2px 0 0; min-width: 3px; cursor: pointer; transition: opacity 0.15s; }
        .turn-bar:hover { opacity: 0.75; }
        .file-row { display: grid; grid-template-columns: 200px 1fr 72px 40px; gap: 10px; align-items: center; padding: 7px 0; border-bottom: 1px solid var(--border); }
        .file-row:last-child { border-bottom: none; }
        .file-row.waste { background: var(--warn-soft); border-radius: 4px; padding: 7px 6px; margin: 0 -6px; }
        .fname { font-size: 12px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .fpath { font-size: 10px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: block; margin-top: 1px; }
        .fbadges { display: flex; gap: 3px; margin-top: 3px; flex-wrap: wrap; }
        .badge { font-size: 9px; padding: 1px 5px; border-radius: 3px; font-weight: 600; letter-spacing: 0.03em; }
        .badge-warn   { background: rgba(232,98,74,0.2); color: var(--warn); }
        .badge-repeat { background: rgba(234,179,8,0.15); color: var(--mid); }
        .bar-wrap { background: var(--border); border-radius: 3px; height: 6px; overflow: hidden; }
        .bar-fill { height: 100%; border-radius: 3px; background: var(--accent); transition: width 0.4s cubic-bezier(0.16,1,0.3,1); }
        .file-row.waste .bar-fill { background: var(--warn); }
        .ftokens { text-align: right; font-size: 11px; color: var(--muted); white-space: nowrap; }
        .fpct { text-align: right; font-size: 11px; color: var(--muted); }
        .waste-banner { background: var(--warn-soft); border: 1px solid rgba(232,98,74,0.25); border-radius: 8px; padding: 12px 16px; display: flex; align-items: center; gap: 10px; font-size: 12px; color: var(--warn); }
        .model-pill { font-size: 10px; padding: 2px 8px; border-radius: 20px; border: 1px solid var(--border2); color: var(--muted); font-family: var(--mono); }
        .loading { color: var(--muted); font-size: 12px; padding: 40px; text-align: center; }
    </style>
</head>
<body>
<header>
    <div class="logo">token<span>maxxer</span></div>
    <div style="color:var(--muted);font-size:11px">session history</div>
    <div class="header-stats" id="header-stats">
        <div class="hstat"><span class="hstat-val" id="hs-sessions">—</span><span class="hstat-label">sessions</span></div>
        <div class="hstat"><span class="hstat-val" id="hs-tokens">—</span><span class="hstat-label">total tokens</span></div>
        <div class="hstat"><span class="hstat-val" id="hs-waste" style="color:var(--warn)">—</span><span class="hstat-label">wasteful files</span></div>
    </div>
</header>
<aside>
    <div class="aside-label">Recent sessions</div>
    <div id="session-list"><div class="loading">loading…</div></div>
</aside>
<main id="main-panel">
    <div class="empty-state">
        <div class="big">⬡</div>
        <div>Select a session to inspect</div>
    </div>
</main>
<script>
    const fmt = n => n >= 1000 ? (n/1000).toFixed(1)+'k' : String(n);
    const fmtDate = s => new Date(s).toLocaleDateString('en-GB',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'});
    function pressureColor(pct) {
      if (pct > 80) return 'var(--warn)';
      if (pct > 50) return 'var(--mid)';
      return 'var(--ok)';
    }
    fetch('/api/stats').then(r=>r.json()).then(s => {
      document.getElementById('hs-sessions').textContent = s.session_count;
      document.getElementById('hs-tokens').textContent   = fmt(s.total_tokens);
      document.getElementById('hs-waste').textContent    = s.wasteful_files;
    });
    let sessions = [];
    fetch('/api/sessions').then(r=>r.json()).then(data => {
      sessions = data;
      const list = document.getElementById('session-list');
      list.innerHTML = '';
      if (!data.length) { list.innerHTML = '<div class="loading">no sessions yet</div>'; return; }
      data.forEach((s, i) => {
        const totalTurns = s.turn_count || 1;
        const avgTokens  = s.total_tokens / Math.max(totalTurns, 1);
        const pressure   = Math.min(100, Math.round((avgTokens / 200000) * 100));
        const color      = pressureColor(pressure);
        const name       = s.project_path.split('/').pop() || s.session_id.slice(0,8);
        const el = document.createElement('div');
        el.className = 'session-item';
        el.dataset.id = s.session_id;
        el.innerHTML = `
          <div class="session-name"><span class="pressure-dot" style="background:${color}"></span>${name}</div>
          <div class="session-meta">
            <span class="session-tokens">${fmt(s.total_tokens)} tok · ${s.turn_count} turns</span>
            <span class="session-date">${fmtDate(s.last_active)}</span>
          </div>`;
        el.addEventListener('click', () => loadSession(s.session_id, el));
        list.appendChild(el);
        if (i === 0) el.click();
      });
    });
    function loadSession(id, el) {
      document.querySelectorAll('.session-item').forEach(e => e.classList.remove('active'));
      if (el) el.classList.add('active');
      const main = document.getElementById('main-panel');
      main.innerHTML = '<div class="loading">loading session…</div>';
      fetch(`/api/sessions/${id}`).then(r=>r.json()).then(d => {
        const { session: s, turns, top_files, wasteful_count } = d;
        const totalTokens = turns.reduce((a,t) => a + t.total_tokens, 0);
        const totalInput  = turns.reduce((a,t) => a + t.input_tokens, 0);
        const totalOutput = turns.reduce((a,t) => a + t.output_tokens, 0);
        const avgCtx      = turns.length ? totalInput / turns.length : 0;
        const pressure    = Math.min(100, Math.round((avgCtx / 200000) * 100));
        const maxTok = Math.max(...turns.map(t => t.total_tokens), 1);
        const turnBars = turns.map(t => {
          const h   = Math.max(4, Math.round((t.total_tokens / maxTok) * 52));
          const pct = Math.min(100, Math.round((t.input_tokens / 200000) * 100));
          const col = pressureColor(pct);
          return `<div class="turn-bar" style="height:${h}px;background:${col}" title="Turn ${t.turn_index+1}: ${t.total_tokens.toLocaleString()} tokens (${pct}% ctx)"></div>`;
        }).join('');
        const maxFileTok = top_files.length ? top_files[0].total_tokens : 1;
        const fileRows = top_files.map(f => {
          const fname = f.file_path.split('/').pop();
          const pct   = Math.round((f.total_tokens / maxFileTok) * 100);
          const ctxPct= Math.round((f.total_tokens / Math.max(totalInput,1)) * 100);
          const waste = f.is_wasteful;
          const repeatBadge = f.total_includes >= 3 ? `<span class="badge badge-repeat">x${f.total_includes} reads</span>` : '';
          const wasteBadge  = waste ? `<span class="badge badge-warn">wasteful</span>` : '';
          const wasteReason = waste ? `<div style="font-size:10px;color:var(--warn);margin-top:3px">${f.waste_reason}</div>` : '';
          return `
            <div class="file-row ${waste ? 'waste' : ''}">
              <div>
                <div class="fname">${fname}</div>
                <span class="fpath">${f.file_path}</span>
                <div class="fbadges">${wasteBadge}${repeatBadge}</div>
                ${wasteReason}
              </div>
              <div class="bar-wrap"><div class="bar-fill" style="width:${pct}%"></div></div>
              <div class="ftokens">${f.total_tokens.toLocaleString()} tok</div>
              <div class="fpct">${ctxPct}%</div>
            </div>`;
        }).join('');
        const wasteBanner = wasteful_count > 0 ? `
          <div class="waste-banner">
            ${wasteful_count} wasteful file${wasteful_count>1?'s':''} detected — consider adding them to <code>.claudeignore</code>
          </div>` : '';
        main.innerHTML = `
          ${wasteBanner}
          <div class="stat-grid">
            <div class="stat-box"><div class="stat-val">${fmt(totalTokens)}</div><div class="stat-label">Total tokens</div></div>
            <div class="stat-box"><div class="stat-val">${fmt(totalInput)}</div><div class="stat-label">Input tokens</div></div>
            <div class="stat-box"><div class="stat-val">${fmt(totalOutput)}</div><div class="stat-label">Output tokens</div></div>
            <div class="stat-box"><div class="stat-val ${pressure>80?'warn':pressure>50?'':' ok'}">${pressure}%</div><div class="stat-label">Avg ctx pressure</div></div>
          </div>
          <div class="card">
            <div class="card-header">
              <span class="card-title">Context pressure per turn</span>
              <span class="model-pill">${s.model}</span>
            </div>
            <div class="card-body">
              <div class="turns-chart">${turnBars}</div>
              <div style="display:flex;gap:16px;margin-top:8px">
                <span style="font-size:10px;color:var(--ok)">● low</span>
                <span style="font-size:10px;color:var(--mid)">● medium</span>
                <span style="font-size:10px;color:var(--warn)">● high</span>
              </div>
            </div>
          </div>
          <div class="card">
            <div class="card-header">
              <span class="card-title">What's eating your context</span>
              <span style="font-size:11px;color:var(--muted)">${top_files.length} files</span>
            </div>
            <div class="card-body">
              ${fileRows || '<div style="color:var(--muted)">No file reads in this session.</div>'}
            </div>
          </div>`;
      });
    }
</script>
</body>
</html>
