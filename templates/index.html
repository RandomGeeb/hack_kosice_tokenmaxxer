<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>tokenmaxxer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
          --bg:         #1e1f22;
          --surface:    #2b2d30;
          --surface2:   #383a3e;
          --border:     #393b40;
          --border2:    #4d5052;
          --text:       #bcbec4;
          --text-strong:#dde1e7;
          --muted:      #6f737a;
          --accent:     #3574f0;
          --accent-soft:rgba(53,116,240,0.12);
          --accent2:    #56a37e;
          --warn:       #e05555;
          --warn-soft:  rgba(224,85,85,0.12);
          --ok:         #56a37e;
          --mid:        #e5a44b;
          --mono:       'JetBrains Mono', monospace;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
          background: var(--bg);
          color: var(--text);
          font-family: var(--mono);
          font-size: 12px;
          min-height: 100vh;
          display: grid;
          grid-template-columns: 280px 1fr;
          grid-template-rows: 44px 1fr;
          height: 100vh;
          overflow: hidden;
        }

        /* ── Toolbar ──────────────────────────────────────────────────────────── */
        header {
          grid-column: 1/-1;
          background: var(--surface);
          border-bottom: 1px solid var(--border);
          display: flex;
          align-items: stretch;
          padding: 0;
        }
        .logo {
          display: flex; align-items: center;
          padding: 0 16px;
          font-size: 13px; font-weight: 700;
          letter-spacing: -0.3px;
          color: var(--text-strong);
          border-right: 1px solid var(--border);
          gap: 7px;
        }
        .logo-icon {
          width: 18px; height: 18px;
          background: var(--accent);
          border-radius: 3px;
          display: flex; align-items: center; justify-content: center;
          font-size: 10px; font-weight: 700; color: #fff;
          flex-shrink: 0;
        }
        .logo-word { color: var(--text-strong); }
        .logo-word span { color: var(--accent); }

        .tabs { display: flex; align-items: stretch; margin-left: 4px; }
        .tab {
          display: flex; align-items: center; gap: 6px;
          padding: 0 14px;
          font-size: 12px; font-weight: 500;
          color: var(--muted);
          border-bottom: 2px solid transparent;
          cursor: pointer;
          transition: color 0.12s, border-color 0.12s;
          user-select: none;
        }
        .tab:hover { color: var(--text); }
        .tab.active { color: var(--text-strong); border-bottom-color: var(--accent); }

        .live-dot {
          width: 5px; height: 5px; border-radius: 50%;
          background: var(--ok);
          animation: pulse 2s infinite;
        }
        .live-dot.inactive { background: var(--muted); animation: none; }
        @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.25; } }

        .header-stats { margin-left: auto; display: flex; align-items: center; gap: 0; padding-right: 2px; }
        .hstat {
          display: flex; flex-direction: column; align-items: flex-end;
          padding: 0 14px; border-left: 1px solid var(--border);
          height: 100%; justify-content: center;
        }
        .hstat-val { font-size: 13px; font-weight: 600; color: var(--text-strong); }
        .hstat-label { font-size: 10px; color: var(--muted); margin-top: 1px; }

        /* ── Sidebar ──────────────────────────────────────────────────────────── */
        aside {
          background: var(--surface);
          border-right: 1px solid var(--border);
          overflow-y: auto;
          display: flex; flex-direction: column;
        }
        .aside-header {
          padding: 8px 12px 6px;
          font-size: 10px; font-weight: 600;
          text-transform: uppercase; letter-spacing: 0.08em;
          color: var(--muted);
          border-bottom: 1px solid var(--border);
          flex-shrink: 0;
        }
        .session-list-wrap { flex: 1; overflow-y: auto; padding: 2px 0; }

        .session-item {
          padding: 7px 12px;
          cursor: pointer;
          border-left: 2px solid transparent;
          transition: background 0.08s;
        }
        .session-item:hover { background: rgba(255,255,255,0.04); }
        .session-item.active { background: var(--accent-soft); border-left-color: var(--accent); }
        .session-item.live-session { border-left-color: var(--ok); }
        .session-item.live-session.active { background: rgba(86,163,126,0.1); }
        .session-name {
          font-size: 12px; font-weight: 500; color: var(--text-strong);
          margin-bottom: 2px;
          white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .session-meta { display: flex; justify-content: space-between; align-items: center; }
        .session-tokens { color: var(--muted); font-size: 10px; }
        .session-date { color: var(--muted); font-size: 10px; }
        .badge-live {
          font-size: 9px; padding: 1px 5px; border-radius: 2px;
          background: rgba(86,163,126,0.2); color: var(--ok);
          font-weight: 700; letter-spacing: 0.05em; margin-right: 4px;
        }

        /* ── Main area ────────────────────────────────────────────────────────── */
        main { overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 20px; background: var(--bg); }
        .page { display: none; flex-direction: column; gap: 20px; }
        .page.active { display: flex; }

        .empty-state {
          display: flex; flex-direction: column; align-items: center; justify-content: center;
          min-height: 200px; color: var(--muted); gap: 6px; font-size: 12px;
        }
        .empty-state .icon { font-size: 24px; opacity: 0.3; }

        /* ── Stat grid ────────────────────────────────────────────────────────── */
        .stat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }
        .stat-box {
          background: var(--surface); border: 1px solid var(--border);
          border-radius: 2px; padding: 16px 18px;
        }
        .stat-val { font-size: 20px; font-weight: 700; color: var(--text-strong); line-height: 1; margin-bottom: 4px; }
        .stat-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.07em; color: var(--muted); }

        .ctx-bar-wrap { background: var(--border); border-radius: 1px; height: 4px; overflow: hidden; margin: 6px 0 2px; }
        .ctx-bar-fill { height: 100%; border-radius: 1px; transition: width 0.5s cubic-bezier(0.16,1,0.3,1); }

        /* ── Cards / tool windows ─────────────────────────────────────────────── */
        .card { background: var(--surface); border: 1px solid var(--border); border-radius: 2px; overflow: hidden; }
        .card-header {
          padding: 7px 12px;
          border-bottom: 1px solid var(--border);
          display: flex; align-items: center; justify-content: space-between;
          background: var(--surface2);
        }
        .card-title {
          font-size: 11px; font-weight: 600;
          text-transform: uppercase; letter-spacing: 0.07em;
          color: var(--muted);
        }
        .card-badge {
          font-size: 10px; color: var(--muted);
          background: var(--border); border-radius: 2px;
          padding: 1px 6px;
        }
        .card-body { padding: 0; display: flex; flex-direction: column; gap: 1px; }

        /* ── Component rows ───────────────────────────────────────────────────── */
        .comp-row {
          display: grid; grid-template-columns: 150px 1fr 78px 44px;
          gap: 8px; align-items: center;
          padding: 6px 12px;
          border-bottom: 1px solid var(--border);
        }
        .comp-row:last-child { border-bottom: none; }
        .comp-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; display: inline-block; margin-right: 6px; }
        .comp-label { font-size: 11px; font-weight: 500; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .bar-wrap { background: var(--border); border-radius: 1px; height: 4px; overflow: hidden; }
        .bar-fill { height: 100%; border-radius: 1px; transition: width 0.4s cubic-bezier(0.16,1,0.3,1); }
        .comp-tokens { text-align: right; font-size: 10px; color: var(--muted); white-space: nowrap; }
        .comp-pct { text-align: right; font-size: 11px; font-weight: 600; }

        /* ── Skill group rows ─────────────────────────────────────────────────── */
        .group-row { border-bottom: 1px solid var(--border); }
        .group-row:last-child { border-bottom: none; }
        .group-header {
          display: grid; grid-template-columns: 150px 1fr 78px 44px 18px;
          gap: 8px; align-items: center;
          padding: 6px 12px;
          cursor: pointer; user-select: none;
          background: var(--surface);
          transition: background 0.08s;
        }
        .group-header:hover { background: var(--surface2); }
        .group-name { font-size: 11px; font-weight: 600; color: var(--text); }
        .group-count { font-size: 10px; color: var(--muted); margin-left: 4px; }
        .group-chevron { font-size: 9px; color: var(--muted); text-align: center; transition: transform 0.15s; display: inline-block; }
        .group-chevron.open { transform: rotate(90deg); }
        .group-skills {
          display: none; padding: 2px 0 2px 0;
          background: var(--bg);
          border-top: 1px solid var(--border);
        }
        .group-skills.open { display: block; }
        .skill-row {
          display: grid; grid-template-columns: 150px 1fr 78px 44px;
          gap: 8px; align-items: center;
          padding: 4px 12px 4px 28px;
          border-bottom: 1px solid rgba(255,255,255,0.025);
        }
        .skill-row:last-child { border-bottom: none; }
        .skill-name { font-size: 11px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .skill-tokens { text-align: right; font-size: 10px; color: var(--muted); opacity: 0.7; }
        .skill-pct { text-align: right; font-size: 10px; color: var(--muted); opacity: 0.7; }

        /* ── Burner rows ──────────────────────────────────────────────────────── */
        .burner-row {
          display: grid; grid-template-columns: 170px 1fr 88px 36px 16px;
          gap: 8px; align-items: center;
          padding: 6px 12px;
          border-bottom: 1px solid var(--border);
          cursor: pointer; user-select: none;
          transition: background 0.08s;
        }
        .burner-row:hover { background: rgba(255,255,255,0.03); }
        .burner-label { font-size: 11px; font-weight: 500; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .burner-sub { font-size: 10px; color: var(--muted); margin-top: 1px; }
        .burner-tokens { text-align: right; font-size: 10px; color: var(--muted); }
        .burner-pct { text-align: right; font-size: 11px; font-weight: 600; }
        .burner-chevron { font-size: 9px; color: var(--muted); text-align: center; transition: transform 0.15s; display: inline-block; }
        .burner-chevron.open { transform: rotate(90deg); }

        .burner-expand { display: none; background: var(--bg); border-bottom: 1px solid var(--border); }
        .burner-expand.open { display: block; }
        .expand-row {
          display: grid; grid-template-columns: 170px 1fr 88px;
          gap: 8px; align-items: center;
          padding: 4px 12px 4px 28px;
          border-bottom: 1px solid rgba(255,255,255,0.025);
          font-size: 10px;
        }
        .expand-row:last-child { border-bottom: none; }
        .expand-label { color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .expand-sub { font-size: 9px; color: var(--muted); opacity: 0.6; margin-top: 1px; }
        .expand-bar { background: var(--border); border-radius: 1px; height: 3px; overflow: hidden; }
        .expand-bar-fill { height: 100%; border-radius: 1px; opacity: 0.55; }
        .expand-tokens { text-align: right; color: var(--muted); }

        .model-pill {
          font-size: 10px; padding: 1px 6px; border-radius: 2px;
          border: 1px solid var(--border2); color: var(--muted);
        }
        .loading { color: var(--muted); font-size: 12px; padding: 32px; text-align: center; }

        /* ── Settings ─────────────────────────────────────────────────────────────── */
        .settings-btn {
          display: flex; align-items: center; justify-content: center;
          width: 36px; height: 100%; border-left: 1px solid var(--border);
          color: var(--muted); cursor: pointer; font-size: 14px;
          transition: color 0.12s, background 0.12s; flex-shrink: 0;
        }
        .settings-btn:hover { color: var(--text); background: rgba(255,255,255,0.04); }
        .settings-btn.active { color: var(--accent); }

        .settings-panel {
          display: none; position: fixed; top: 44px; right: 0;
          width: 320px; background: var(--surface); border: 1px solid var(--border);
          border-top: none; z-index: 100; padding: 14px 16px 16px;
          box-shadow: 0 8px 24px rgba(0,0,0,0.4);
        }
        .settings-panel.open { display: block; }
        .settings-title {
          font-size: 10px; font-weight: 600; text-transform: uppercase;
          letter-spacing: 0.08em; color: var(--muted); margin-bottom: 10px;
        }
        .key-row { display: flex; gap: 6px; align-items: center; }
        .key-input {
          flex: 1; font-family: var(--mono); font-size: 11px;
          background: var(--surface2); color: var(--text);
          border: 1px solid var(--border2); border-radius: 2px;
          padding: 5px 8px; min-width: 0;
        }
        .key-input:focus { outline: none; border-color: var(--accent); }
        .key-input::placeholder { color: var(--muted); }
        .key-toggle {
          font-size: 12px; color: var(--muted); cursor: pointer;
          padding: 4px; flex-shrink: 0;
        }
        .key-toggle:hover { color: var(--text); }
        .settings-actions { display: flex; gap: 6px; margin-top: 8px; }
        .settings-btn-sm {
          font-family: var(--mono); font-size: 11px; font-weight: 500;
          padding: 4px 10px; border-radius: 2px; cursor: pointer;
          border: 1px solid var(--border2); background: var(--surface2); color: var(--text);
          transition: all 0.1s;
        }
        .settings-btn-sm:hover { border-color: var(--accent); color: var(--accent); }
        .settings-btn-sm.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
        .settings-btn-sm.primary:hover { opacity: 0.9; }
        .settings-btn-sm.danger { color: var(--warn); border-color: var(--warn-soft); }
        .settings-btn-sm.danger:hover { background: var(--warn-soft); }
        .key-status { font-size: 10px; margin-top: 8px; display: flex; align-items: center; gap: 5px; }
        .key-status-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }

        .waiting-banner {
          border: 1px solid var(--border); border-radius: 2px; padding: 32px 24px;
          text-align: center; color: var(--muted); background: var(--surface);
          display: flex; flex-direction: column; align-items: center; gap: 8px;
        }
        .waiting-banner .icon { font-size: 22px; opacity: 0.25; }
        .waiting-banner .title { font-size: 13px; font-weight: 600; color: var(--text-strong); }
        .waiting-banner .sub { font-size: 11px; color: var(--muted); max-width: 280px; line-height: 1.5; }

        /* ── Donut chart ──────────────────────────────────────────────────────── */
        .chart-panel {
          display: flex; align-items: center; gap: 24px;
          padding: 24px 24px 20px;
          border-bottom: 1px solid var(--border);
          background: var(--bg);
        }
        .donut-wrap { position: relative; flex-shrink: 0; width: 180px; height: 180px; }
        .donut-wrap svg { transform: rotate(-90deg); display: block; }
        .donut-centre {
          position: absolute; inset: 0;
          display: flex; flex-direction: column; align-items: center; justify-content: center;
          pointer-events: none;
        }
        .donut-total { font-size: 16px; font-weight: 700; color: var(--text-strong); line-height: 1; }
        .donut-sub { font-size: 9px; color: var(--muted); margin-top: 3px; text-transform: uppercase; letter-spacing: 0.06em; }
        .donut-pct { font-size: 10px; font-weight: 600; margin-top: 4px; padding: 1px 5px; border-radius: 2px; }
        .donut-legend { flex: 1; display: grid; grid-template-columns: 1fr 1fr; gap: 4px 12px; align-content: center; min-width: 0; }
        .legend-item { display: flex; align-items: center; gap: 6px; min-width: 0; }
        .legend-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
        .legend-label { font-size: 13px; color: var(--text); flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .legend-pct { font-size: 13px; font-weight: 600; flex-shrink: 0; }
        @keyframes slice-in { from { opacity: 0; } to { opacity: 1; } }
        .donut-slice { animation: slice-in 0.4s ease both; }

        /* ── Cost estimator ───────────────────────────────────────────────────── */
        .cost-controls {
          display: flex; align-items: center; gap: 10px;
          padding: 7px 12px; border-bottom: 1px solid var(--border);
          background: var(--bg);
        }
        .cost-controls-label { font-size: 10px; color: var(--muted); }
        .cost-model-select {
          font-family: var(--mono); font-size: 11px;
          background: var(--surface2); color: var(--text);
          border: 1px solid var(--border2); border-radius: 2px;
          padding: 2px 6px; cursor: pointer;
        }
        .cost-model-select:focus { outline: none; border-color: var(--accent); }
        .currency-toggle { display: flex; gap: 1px; margin-left: auto; }
        .currency-btn {
          font-family: var(--mono); font-size: 10px; font-weight: 600;
          padding: 2px 8px; border: 1px solid var(--border2);
          background: var(--surface2); color: var(--muted); cursor: pointer;
          transition: all 0.1s;
        }
        .currency-btn:first-child { border-radius: 2px 0 0 2px; }
        .currency-btn:last-child  { border-radius: 0 2px 2px 0; }
        .currency-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
        .cost-grid { display: grid; grid-template-columns: 1fr; }
        .cost-box { padding: 18px 20px; border-right: 1px solid var(--border); }
        .cost-box:last-child { border-right: none; }
        .cost-val { font-size: 18px; font-weight: 700; color: var(--accent2); line-height: 1; margin-bottom: 4px; }
        .cost-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.07em; color: var(--muted); }
        .cost-sub { font-size: 10px; color: var(--muted); margin-top: 3px; }

        /* ── Period toggle ────────────────────────────────────────────────────────── */
        .period-toggle { display: flex; gap: 1px; margin-bottom: 8px; }
        .period-btn {
          font-family: var(--mono); font-size: 11px; font-weight: 500;
          padding: 4px 14px; border: 1px solid var(--border2);
          background: var(--surface2); color: var(--muted); cursor: pointer;
          transition: all 0.1s;
        }
        .period-btn:first-child { border-radius: 2px 0 0 2px; }
        .period-btn:last-child  { border-radius: 0 2px 2px 0; }
        .period-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

        /* ── Analytics 4-column grid ──────────────────────────────────────────────── */
        .analytics-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 8px; }

        /* ── Time bar chart ───────────────────────────────────────────────────────── */
        .time-chart { padding: 10px 12px 6px; }
        .time-chart-bars { display: flex; align-items: stretch; gap: 3px; height: 96px; }
        .time-bar-col {
          display: flex; flex-direction: column; align-items: center;
          flex: 1; min-width: 0; cursor: default;
        }
        .time-bar-spacer { flex: 1; }
        .time-bar-fill { width: 100%; border-radius: 1px 1px 0 0; }
        .time-bar-label {
          font-size: 8px; color: var(--muted); margin-top: 3px;
          text-align: center; white-space: nowrap; overflow: hidden;
          max-width: 100%; text-overflow: ellipsis;
        }

        /* ── Pressure line chart ──────────────────────────────────────────────────── */
        .pressure-chart-wrap {
          background: var(--surface); border: 1px solid var(--border);
          border-radius: 2px; overflow: hidden;
        }
        .pressure-chart-header {
          padding: 7px 12px;
          border-bottom: 1px solid var(--border);
          display: flex; align-items: center; justify-content: space-between;
          background: var(--surface2);
        }
        .pressure-chart-title {
          font-size: 11px; font-weight: 600;
          text-transform: uppercase; letter-spacing: 0.07em; color: var(--muted);
        }
        .pressure-chart-meta { font-size: 10px; color: var(--muted); }
        .pressure-chart-body { padding: 8px 12px 10px; }
        .pressure-chart-body svg { overflow: visible; }
    </style>
</head>
<body>
<header>
    <div class="logo">
        <div class="logo-icon">T</div>
        <div class="logo-word">token<span>maxxer</span></div>
    </div>
    <nav class="tabs" id="tab-nav">
        <div class="tab active" data-page="live">Live <span class="live-dot inactive" id="live-dot"></span></div>
        <div class="tab" data-page="history">History</div>
        <div class="tab" data-page="stats">Insights</div>
    </nav>
    <div class="header-stats">
        <div class="hstat"><span class="hstat-val" id="hs-sessions">—</span><span class="hstat-label">sessions</span></div>
        <div class="hstat"><span class="hstat-val" id="hs-tokens">—</span><span class="hstat-label">total tokens</span></div>
    </div>
    <div class="settings-btn" id="settings-btn" onclick="toggleSettings()" title="API Key Settings">⚙</div>
</header>
<div class="settings-panel" id="settings-panel">
    <div class="settings-title">Anthropic API Key</div>
    <div class="key-row">
        <input class="key-input" id="key-input" type="password" placeholder="sk-ant-api03-…" autocomplete="off" oninput="onKeyInput()">
        <span class="key-toggle" id="key-toggle" onclick="toggleKeyVis()" title="Show/hide">👁</span>
    </div>
    <div class="settings-actions">
        <button class="settings-btn-sm primary" onclick="saveKey()">Save</button>
        <button class="settings-btn-sm" onclick="testKey()" id="test-btn">Test connection</button>
        <button class="settings-btn-sm danger" onclick="removeKey()" id="remove-btn" style="display:none">Remove</button>
    </div>
    <div class="key-status" id="key-status" style="display:none"></div>
</div>
<aside>
    <div class="aside-header">Sessions</div>
    <div class="session-list-wrap">
        <div id="session-list"><div class="loading">loading…</div></div>
    </div>
</aside>
<main>
    <div class="page active" id="page-live">
        <div id="live-panel"><div class="loading">connecting…</div></div>
    </div>
    <div class="page" id="page-history">
        <div id="history-panel">
            <div class="empty-state">
                <div class="icon">◻</div>
                <div>Select a session from the sidebar</div>
            </div>
        </div>
    </div>
    <div class="page" id="page-stats">
        <div id="stats-panel"><div class="loading">loading…</div></div>
    </div>
</main>

<script>
    // 8 hues evenly spaced ~45° apart on the wheel, tuned for dark backgrounds
    const COLORS = ["#5b8af5","#3dce7a","#f5a623","#a855f7","#ff6b6b","#e879aa","#22d0ee","#c8de3f"];
    const fmt = n => n >= 1e6 ? (n/1e6).toFixed(1)+'M' : n >= 1000 ? (n/1000).toFixed(1)+'k' : String(n);
    const fmtDate = s => s ? new Date(s).toLocaleDateString('en-GB',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'}) : '—';
    function pressureColor(pct) {
        if (pct > 80) return 'var(--warn)';
        if (pct > 50) return 'var(--mid)';
        return 'var(--ok)';
    }

    // ── Tab switching ─────────────────────────────────────────────────────────────
    function showPage(name) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById('page-' + name).classList.add('active');
        const matchingTab = document.querySelector(`.tab[data-page="${name}"]`);
        if (matchingTab) matchingTab.classList.add('active');
        if (name === 'stats') loadStatsPage(_activePeriod);
    }
    document.getElementById('tab-nav').addEventListener('click', e => {
        const tab = e.target.closest('.tab');
        if (tab && tab.dataset.page) showPage(tab.dataset.page);
    });

    // ── Header stats ──────────────────────────────────────────────────────────────
    function refreshStats() {
        fetch('/api/stats').then(r => r.json()).then(s => {
            document.getElementById('hs-sessions').textContent = s.session_count;
            document.getElementById('hs-tokens').textContent   = fmt(s.total_tokens);
        }).catch(() => {});
    }
    refreshStats();

    // ── Sidebar ───────────────────────────────────────────────────────────────────
    let activeSessionId = null;
    function buildSidebar(sessions) {
        const list = document.getElementById('session-list');
        list.innerHTML = '';
        if (!sessions.length) { list.innerHTML = '<div class="loading">no sessions yet</div>'; return; }
        sessions.forEach(s => {
            const name  = (s.project_path || '').split('/').pop() || s.session_id.slice(0,8);
            const total = s.total_tokens || 0;
            const live  = s.is_active === 1;
            const el = document.createElement('div');
            el.className = 'session-item' + (live ? ' live-session' : '') + (s.session_id === activeSessionId ? ' active' : '');
            el.dataset.id = s.session_id;
            el.innerHTML = `
                <div class="session-name">${live ? '<span class="badge-live">LIVE</span>' : ''}${name}</div>
                <div class="session-meta">
                    <span class="session-tokens">${fmt(total)} tok</span>
                    <span class="session-date">${fmtDate(s.last_active)}</span>
                </div>`;
            el.addEventListener('click', () => {
                activeSessionId = s.session_id;
                document.querySelectorAll('.session-item').forEach(e => e.classList.remove('active'));
                el.classList.add('active');
                if (s.is_active) {
                    showPage('live');
                } else {
                    showPage('history');
                    loadSessionDetail(s.session_id);
                }
            });
            list.appendChild(el);
        });
    }
    function refreshSidebar() {
        fetch('/api/sessions').then(r => r.json()).then(s => { window._allSessions = s; buildSidebar(s); }).catch(() => {});
    }
    refreshSidebar();


    // ── Donut chart ───────────────────────────────────────────────────────────────
    function renderDonut(components, skillGroups, grandTotal, pct, pctColor) {
        const R = 44, SW = 13, CX = 60, CY = 60, circ = 2 * Math.PI * R, GAP = 1.5;
        const slices = [];
        let ci = 0;
        components.forEach((c) => {
            if (c.label === 'Global Skills' && skillGroups && skillGroups.length) { ci++; return; }
            slices.push({ label: c.label, tokens: c.tokens, color: COLORS[ci++ % COLORS.length] });
        });
        const skillStartIdx = ci;
        (skillGroups || []).forEach((g, gi) =>
            slices.push({ label: g.group === 'other' ? 'Loaded Skills' : g.group, tokens: g.total, color: COLORS[(skillStartIdx + gi) % COLORS.length] }));

        const total = slices.reduce((a, s) => a + s.tokens, 0) || 1;
        let offset = 0;
        const rings = slices.map((s, i) => {
            const frac = s.tokens / total;
            const dash = Math.max(0, frac * circ - GAP);
            const off  = -(offset * circ);
            offset += frac;
            return `<circle class="donut-slice" cx="${CX}" cy="${CY}" r="${R}" fill="none"
                stroke="${s.color}" stroke-width="${SW}"
                stroke-dasharray="${dash.toFixed(2)} ${circ.toFixed(2)}"
                stroke-dashoffset="${off.toFixed(2)}"
                style="animation-delay:${(i*0.04).toFixed(2)}s"/>`;
        }).join('');

        const legend = slices.slice(0, 10).map(s => {
            const p = (s.tokens / total * 100).toFixed(1);
            return `<div class="legend-item">
                <div class="legend-dot" style="background:${s.color}"></div>
                <div class="legend-label" title="${s.label}">${s.label}</div>
                <div class="legend-pct" style="color:${s.color}">${p}%</div>
            </div>`;
        }).join('');

        const pctStyle = pct > 80 ? 'background:var(--warn-soft);color:var(--warn)' :
                         pct > 50 ? 'background:rgba(229,164,75,0.12);color:var(--mid)' :
                                    'background:rgba(86,163,126,0.12);color:var(--ok)';
        return `<div class="chart-panel">
            <div class="donut-wrap">
                <svg viewBox="0 0 120 120" width="180" height="180">
                    <circle cx="${CX}" cy="${CY}" r="${R}" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="${SW}"/>
                    ${rings}
                </svg>
                <div class="donut-centre">
                    <div class="donut-total">${fmt(grandTotal)}</div>
                    <div class="donut-sub">tokens</div>
                    <div class="donut-pct" style="${pctStyle}">${pct}% ctx</div>
                </div>
            </div>
            <div class="donut-legend">${legend}</div>
        </div>`;
    }

    // ── Cost estimator ────────────────────────────────────────────────────────────
    const PRICING = {
        'Sonnet 4.6': 3.00,
        'Opus 4.7':   15.00,
        'Haiku 4.5':  0.80,
    };
    const FX     = { USD: 1, EUR: 0.92, GBP: 0.79 };
    const SYM    = { USD: '$', EUR: '€', GBP: '£' };
    let _costCurrency = 'EUR';
    let _costModel    = 'Sonnet 4.6';
    let _costTokens   = 0;

    function tokCost(tokens, model, currency) {
        return tokens / 1_000_000 * PRICING[model] * FX[currency];
    }
    function fmtCost(n, currency) {
        return SYM[currency] + (n < 0.001 ? n.toFixed(5) : n < 0.01 ? n.toFixed(4) : n.toFixed(2));
    }
    function monthlyProjection(currency, model) {
        const now = Date.now(), ms30 = 30 * 24 * 3600e3;
        const recent = (window._allSessions || []).filter(s => (now - new Date(s.last_active).getTime()) < ms30);
        if (!recent.length) return null;
        const totalTok = recent.reduce((a, s) => a + (s.total_tokens || 0), 0);
        const oldest   = Math.min(...recent.map(s => new Date(s.last_active).getTime()));
        const daysCov  = Math.max(1, (now - oldest) / (24 * 3600e3));
        const projected = (totalTok / daysCov) * 30;
        return { cost: tokCost(projected, model, currency), sessions: recent.length, days: Math.round(daysCov) };
    }

    function updateCostValues() {
        const c = _costCurrency, m = _costModel;
        const sessEl = document.getElementById('cost-session');
        if (!sessEl) return;
        sessEl.textContent = fmtCost(tokCost(_costTokens, m, c), c);
    }

    function renderCostCard(tokens) {
        _costTokens = tokens;
        const modelOpts = Object.keys(PRICING).map(k =>
            `<option value="${k}"${k === _costModel ? ' selected' : ''}>${k}</option>`).join('');
        const curBtns = ['EUR','GBP','USD'].map(c =>
            `<button class="currency-btn${c === _costCurrency ? ' active' : ''}" onclick="setCurrency('${c}')">${SYM[c]}</button>`).join('');
        const sessionCost = fmtCost(tokCost(tokens, _costModel, _costCurrency), _costCurrency);

        return `<div class="card" style="margin-top:28px">
            <div class="card-header">
                <span class="card-title">Cost estimator</span>
                <span class="card-badge">input tokens only</span>
            </div>
            <div class="cost-controls">
                <span class="cost-controls-label">Model</span>
                <select class="cost-model-select" onchange="setModel(this.value)">${modelOpts}</select>
                <div class="currency-toggle">${curBtns}</div>
            </div>
            <div class="cost-grid">
                <div class="cost-box">
                    <div class="cost-val" id="cost-session">${sessionCost}</div>
                    <div class="cost-label">This session</div>
                    <div class="cost-sub">${(tokens/1000).toFixed(1)}k tokens</div>
                </div>
            </div>
        </div>`;
    }

    function setCurrency(c) {
        _costCurrency = c;
        document.querySelectorAll('.currency-btn').forEach(b => b.classList.toggle('active', b.textContent === SYM[c]));
        updateCostValues();
    }
    function setModel(m) {
        _costModel = m;
        updateCostValues();
    }

    // ── Pressure line chart ───────────────────────────────────────────────────────
    const CHART_W = 500, CHART_H = 260, CHART_PAD = { t: 8, r: 8, b: 28, l: 36 };
    const CW = CHART_W - CHART_PAD.l - CHART_PAD.r;
    const CH = CHART_H - CHART_PAD.t - CHART_PAD.b;

    function renderPressureChart(points, N = 30) {
        const recent = points.slice(-N);
        if (recent.length < 2) {
            return `<div class="pressure-chart-wrap">
                <div class="pressure-chart-header">
                    <span class="pressure-chart-title">Context pressure over time</span>
                    <span class="pressure-chart-meta">not enough data</span>
                </div>
                <div class="pressure-chart-body" style="color:var(--muted);font-size:11px;padding:16px 12px">Waiting for turns…</div>
            </div>`;
        }

        const minT = recent[0].turn, maxT = recent[recent.length - 1].turn;
        const xRange = Math.max(maxT - minT, 1);
        const toX = t => CHART_PAD.l + ((t - minT) / xRange) * CW;
        const toY = p => CHART_PAD.t + CH - (Math.min(p, 100) / 100) * CH;

        // grid lines at 25 / 50 / 80 / 100
        const gridPcts = [25, 50, 80, 100];
        const gridLines = gridPcts.map(p => {
            const y = toY(p);
            const color = p === 80 ? 'rgba(224,85,85,0.25)' : p === 50 ? 'rgba(229,164,75,0.2)' : 'rgba(255,255,255,0.05)';
            return `<line x1="${CHART_PAD.l}" y1="${y.toFixed(1)}" x2="${CHART_PAD.l + CW}" y2="${y.toFixed(1)}" stroke="${color}" stroke-width="1"/>
                    <text x="${(CHART_PAD.l - 4).toFixed(1)}" y="${(y + 3).toFixed(1)}" text-anchor="end" fill="rgba(111,115,122,0.8)" font-size="8">${p}%</text>`;
        }).join('');

        // colored polyline segments (green/yellow/red by value)
        let polylines = '';
        for (let i = 1; i < recent.length; i++) {
            const a = recent[i - 1], b = recent[i];
            const pct = b.pct;
            const stroke = pct > 80 ? '#e05555' : pct > 50 ? '#e5a44b' : '#56a37e';
            polylines += `<line x1="${toX(a.turn).toFixed(1)}" y1="${toY(a.pct).toFixed(1)}" x2="${toX(b.turn).toFixed(1)}" y2="${toY(b.pct).toFixed(1)}" stroke="${stroke}" stroke-width="1.5" stroke-linecap="round"/>`;
        }

        // area fill under the line
        const areaPoints = recent.map(p => `${toX(p.turn).toFixed(1)},${toY(p.pct).toFixed(1)}`).join(' ');
        const lastX = toX(recent[recent.length-1].turn).toFixed(1);
        const firstX = toX(recent[0].turn).toFixed(1);
        const baseY = (CHART_PAD.t + CH).toFixed(1);
        const latestPct = recent[recent.length - 1].pct;
        const areaColor = latestPct > 80 ? 'rgba(224,85,85,0.08)' : latestPct > 50 ? 'rgba(229,164,75,0.08)' : 'rgba(86,163,126,0.08)';
        const area = `<polygon points="${areaPoints} ${lastX},${baseY} ${firstX},${baseY}" fill="${areaColor}"/>`;

        // dots at each point
        const dots = recent.map(p => {
            const stroke = p.pct > 80 ? '#e05555' : p.pct > 50 ? '#e5a44b' : '#56a37e';
            return `<circle cx="${toX(p.turn).toFixed(1)}" cy="${toY(p.pct).toFixed(1)}" r="2.5" fill="${stroke}" opacity="0.85">
                <title>turn ${p.turn}: ${p.pct}% (${(p.tokens/1000).toFixed(1)}k tok)</title>
            </circle>`;
        }).join('');

        // x-axis labels (up to 8 evenly spaced turn numbers)
        const xCount = Math.min(recent.length, 8);
        const xLabels = Array.from({length: xCount}, (_, i) => {
            const idx = Math.round(i * (recent.length - 1) / Math.max(xCount - 1, 1));
            const pt  = recent[idx];
            return `<text x="${toX(pt.turn).toFixed(1)}" y="${(CHART_H - 6).toFixed(1)}" text-anchor="middle" fill="rgba(111,115,122,0.8)" font-size="8">t${pt.turn}</text>`;
        }).join('');

        // x-axis baseline
        const baselineY = (CHART_PAD.t + CH).toFixed(1);
        const xAxis = `<line x1="${CHART_PAD.l}" y1="${baselineY}" x2="${CHART_PAD.l + CW}" y2="${baselineY}" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>`;

        const latest = recent[recent.length - 1];
        const latestColor = latest.pct > 80 ? 'var(--warn)' : latest.pct > 50 ? 'var(--mid)' : 'var(--ok)';

        return `<div class="pressure-chart-wrap">
            <div class="pressure-chart-header">
                <span class="pressure-chart-title">Context pressure — last ${recent.length} turns</span>
                <span class="pressure-chart-meta" style="color:${latestColor}">${latest.pct}% now · ${fmt(latest.tokens)} tok</span>
            </div>
            <div class="pressure-chart-body">
                <svg viewBox="0 0 ${CHART_W} ${CHART_H}" style="width:50%;display:block;margin:0 auto">
                    ${gridLines}
                    ${xAxis}
                    ${area}
                    ${polylines}
                    ${dots}
                    ${xLabels}
                </svg>
            </div>
        </div>`;
    }

    let pressureCache = {};

    function fetchPressure(sessionId, cb) {
        fetch(`/api/pressure/${encodeURIComponent(sessionId)}`)
            .then(r => r.json())
            .then(pts => { pressureCache[sessionId] = pts; cb(pts); })
            .catch(() => cb(pressureCache[sessionId] || []));
    }

    // ── Shared renderers ──────────────────────────────────────────────────────────
    function renderComponents(components, grandTotal) {
        if (!components.length) return '';
        let ci = 0;
        return components.map((c) => {
            const color  = COLORS[ci++ % COLORS.length];
            const barPct = grandTotal > 0 ? Math.round(c.tokens / grandTotal * 100) : 0;
            const pct    = c.pct !== undefined ? c.pct : (grandTotal > 0 ? (c.tokens / grandTotal * 100).toFixed(1) : 0);
            return `<div class="comp-row">
                <div><span class="comp-dot" style="background:${color}"></span><span class="comp-label" title="${c.label}">${c.label}</span></div>
                <div class="bar-wrap"><div class="bar-fill" style="width:${barPct}%;background:${color}"></div></div>
                <div class="comp-tokens">${c.tokens.toLocaleString()} tok</div>
                <div class="comp-pct" style="color:${color}">${pct}%</div>
            </div>`;
        }).join('');
    }

    function renderSkillGroups(skillGroups, grandTotal, startIdx = 4) {
        if (!skillGroups || !skillGroups.length) return '';
        return skillGroups.map((g, gi) => {
            const color      = COLORS[(startIdx + gi) % COLORS.length];
            const pct        = grandTotal > 0 ? (g.total / grandTotal * 100).toFixed(1) : 0;
            const barPct     = grandTotal > 0 ? Math.round(g.total / grandTotal * 100) : 0;
            const groupId    = `group-${gi}-${Date.now()}`;
            const groupLabel = g.group === 'other' ? 'Loaded Skills' : g.group;
            const skillRows = g.skills.map(sk => {
                const skPct = g.total > 0 ? (sk.tokens / g.total * 100).toFixed(1) : 0;
                const skBar = g.total > 0 ? Math.round(sk.tokens / g.total * 100) : 0;
                return `<div class="skill-row">
                    <div class="skill-name" title="${sk.label}">${sk.label}</div>
                    <div class="bar-wrap"><div class="bar-fill" style="width:${skBar}%;background:${color};opacity:0.5"></div></div>
                    <div class="skill-tokens">${sk.tokens.toLocaleString()} tok</div>
                    <div class="skill-pct">${skPct}%</div>
                </div>`;
            }).join('');
            return `<div class="group-row">
                <div class="group-header" onclick="toggleGroup('${groupId}')">
                    <div>
                        <span class="comp-dot" style="background:${color}"></span>
                        <span class="group-name">${groupLabel}</span>
                        <span class="group-count">(${g.skills.length})</span>
                    </div>
                    <div class="bar-wrap"><div class="bar-fill" style="width:${barPct}%;background:${color}"></div></div>
                    <div class="comp-tokens">${g.total.toLocaleString()} tok</div>
                    <div class="comp-pct" style="color:${color}">${pct}%</div>
                    <div class="group-chevron" id="chevron-${groupId}">▶</div>
                </div>
                <div class="group-skills" id="${groupId}">${skillRows}</div>
            </div>`;
        }).join('');
    }

    function toggleGroup(id) {
        const el   = document.getElementById(id);
        const chev = document.getElementById('chevron-' + id);
        if (el)   el.classList.toggle('open');
        if (chev) chev.classList.toggle('open');
    }

    // ── Live panel ────────────────────────────────────────────────────────────────
    function renderLive(data) {
        const dot = document.getElementById('live-dot');
        if (!data.active) {
            dot.className = 'live-dot inactive';
            document.getElementById('live-panel').innerHTML = `
                <div class="waiting-banner">
                    <div class="icon">◌</div>
                    <div class="title">No active session</div>
                    <div class="sub">Start a Claude Code session in this project to see live token usage.</div>
                </div>`;
            return;
        }
        dot.className = 'live-dot';
        const s           = data.session;
        const pct         = data.pct_of_context;
        const color       = pressureColor(pct);
        const project     = (s.project_path || '').split('/').pop() || 'unknown';
        const skillGroups = data.skill_groups || [];
        const components  = data.components  || [];
        const totalCount  = components.length + skillGroups.reduce((a, g) => a + g.skills.length, 0);
        const compHtml   = renderComponents(components, data.total);
        const skillHtml  = renderSkillGroups(skillGroups, data.total, components.length);
        const donutHtml  = renderDonut(components, skillGroups, data.total, pct, color);

        fetchPressure(s.session_id, pts => {
            const chartHtml = renderPressureChart(pts);
            const costHtml  = renderCostCard(data.total);
            document.getElementById('live-panel').innerHTML = `
                <div class="stat-grid">
                    <div class="stat-box"><div class="stat-val">${fmt(data.total)}</div><div class="stat-label">Tokens used</div></div>
                    <div class="stat-box">
                        <div class="stat-val" style="color:${color}">${pct}%</div>
                        <div class="stat-label">Context pressure</div>
                        <div class="ctx-bar-wrap"><div class="ctx-bar-fill" style="width:${pct}%;background:${color}"></div></div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-val" style="font-size:13px;padding-top:2px">${project}</div>
                        <div class="stat-label">Project</div>
                        ${s.model ? `<div style="margin-top:6px"><span class="model-pill">${s.model}</span></div>` : ''}
                    </div>
                </div>
                ${costHtml}
                ${chartHtml}
                <div class="card" style="margin-top:28px">
                    <div class="card-header">
                        <span class="card-title">Context breakdown</span>
                        <span class="card-badge">${totalCount} components</span>
                    </div>
                    <div class="card-body">
                        ${donutHtml}
                        ${compHtml || ''}
                        ${skillHtml || ''}
                        ${!compHtml && !skillHtml ? '<div style="color:var(--muted);padding:12px">No data yet.</div>' : ''}
                    </div>
                </div>`;
        });
    }

    function pollLive() {
        fetch('/api/current').then(r => r.json()).then(renderLive).catch(() => {});
    }
    pollLive();
    setInterval(pollLive, 5000);

    // ── History detail ────────────────────────────────────────────────────────────
    function renderHistoryPanel(d) {
        const panel = document.getElementById('history-panel');
        const s           = d.session;
        const components  = d.components  || [];
        const skillGroups = d.skill_groups || [];
        const compTotal   = components.reduce((a, c) => a + (c.tokens || 0), 0);
        const skillTotal  = skillGroups.reduce((a, g) => a + g.total, 0);
        const grandTotal  = compTotal + skillTotal;
        const pct         = grandTotal > 0 ? Math.round(grandTotal / 200000 * 100) : 0;
        const pctColor    = pressureColor(pct);
        const project     = (s.project_path || '').split('/').pop() || s.session_id.slice(0,8);
        const totalCount  = components.length + skillGroups.reduce((a, g) => a + g.skills.length, 0);
        const compHtml  = renderComponents(components, grandTotal);
        const skillHtml = renderSkillGroups(skillGroups, grandTotal, components.length);
        const donutHtml = renderDonut(components, skillGroups, grandTotal, pct, pctColor);
        const costHtml  = renderCostCard(grandTotal);

        panel.innerHTML = `
            <div class="stat-grid">
                <div class="stat-box"><div class="stat-val">${fmt(grandTotal)}</div><div class="stat-label">Total tokens</div></div>
                <div class="stat-box">
                    <div class="stat-val" style="color:${pctColor}">${pct}%</div>
                    <div class="stat-label">Peak ctx pressure</div>
                    <div class="ctx-bar-wrap"><div class="ctx-bar-fill" style="width:${pct}%;background:${pctColor}"></div></div>
                </div>
                <div class="stat-box">
                    <div class="stat-val" style="font-size:13px;padding-top:2px">${project}</div>
                    <div class="stat-label">Project</div>
                    ${s.model ? `<div style="margin-top:6px"><span class="model-pill">${s.model}</span></div>` : ''}
                </div>
            </div>
            ${costHtml}
            <div class="card" style="margin-top:28px">
                <div class="card-header">
                    <span class="card-title">Context breakdown</span>
                    <span class="card-badge">${fmtDate(s.last_active)} · ${totalCount} components</span>
                </div>
                <div class="card-body">
                    ${donutHtml}
                    ${compHtml || ''}
                    ${skillHtml || ''}
                    ${!compHtml && !skillHtml ? '<div style="color:var(--muted);padding:12px">No breakdown recorded yet.</div>' : ''}
                </div>
            </div>`;
    }

    function loadSessionDetail(id) {
        const panel = document.getElementById('history-panel');
        panel.innerHTML = '<div class="loading">loading…</div>';
        fetch(`/api/sessions/${encodeURIComponent(id)}`)
            .then(r => r.json())
            .then(d => {
                if (d.error) {
                    panel.innerHTML = `<div class="empty-state"><div class="icon">✕</div><div>${d.error}</div></div>`;
                    return;
                }
                renderHistoryPanel(d);
            })
            .catch(() => {
                panel.innerHTML = '<div class="empty-state"><div class="icon">✕</div><div>Failed to load session.</div></div>';
            });
    }

    // ── Top Burners + Analytics ───────────────────────────────────────────────────
    let _activePeriod = 'week';
    const PERIOD_LABEL = { day: 'last 24 hours', week: 'last 7 days', month: 'last 30 days' };

    function switchPeriod(p) {
        _activePeriod = p;
        document.querySelectorAll('.period-btn').forEach(b => b.classList.toggle('active', b.dataset.period === p));
        Promise.all([
            fetch(`/api/analytics?period=${p}`).then(r => r.json()),
            fetch(`/api/burners?period=${p}`).then(r => r.json()),
        ]).then(([analytics, burners]) => {
            renderAnalytics(analytics, p);
            renderBurnersList(burners, p);
        }).catch(() => {});
    }

    function loadStatsPage(period) {
        const panel = document.getElementById('stats-panel');
        const activeCls = p => p === period ? ' active' : '';
        panel.innerHTML = `
            <div class="period-toggle">
                <button class="period-btn${activeCls('day')}"   data-period="day"   onclick="switchPeriod('day')">Day</button>
                <button class="period-btn${activeCls('week')}"  data-period="week"  onclick="switchPeriod('week')">Week</button>
                <button class="period-btn${activeCls('month')}" data-period="month" onclick="switchPeriod('month')">Month</button>
            </div>
            <div id="analytics-section"><div class="loading">loading…</div></div>
            <div id="burners-section"><div class="loading">loading…</div></div>`;

        Promise.all([
            fetch(`/api/analytics?period=${period}`).then(r => r.json()),
            fetch(`/api/burners?period=${period}`).then(r => r.json()),
        ]).then(([analytics, burners]) => {
            renderAnalytics(analytics, period);
            renderBurnersList(burners, period);
        }).catch(() => {
            document.getElementById('analytics-section').innerHTML =
                '<div class="empty-state"><div class="icon">✕</div><div>Failed to load analytics.</div></div>';
            document.getElementById('burners-section').innerHTML = '';
        });
    }

    function renderSessionTimeline(period) {
        const now = Date.now();
        const cutoffs = { day: 86400e3, week: 7*86400e3, month: 30*86400e3 };
        const cutoff  = now - (cutoffs[period] || cutoffs.week);
        const sessions = (window._allSessions || [])
            .filter(s => s.last_active && new Date(s.last_active).getTime() >= cutoff)
            .sort((a, b) => new Date(a.last_active) - new Date(b.last_active));

        if (sessions.length < 1) return '';

        const CTX_MAX = 200000;
        const W = 500, H = 180, PAD = { t: 10, r: 12, b: 32, l: 40 };
        const cw = W - PAD.l - PAD.r, ch = H - PAD.t - PAD.b;

        // X axis spans the full period window, not just session range
        const minT = cutoff, maxT = now, tRange = maxT - minT;
        const toX = t => PAD.l + ((t - minT) / tRange) * cw;
        const toY = pct => PAD.t + ch - (Math.min(pct, 100) / 100) * ch;

        // y grid lines
        const gridPcts = [25, 50, 80, 100];
        const gridLines = gridPcts.map(p => {
            const y = toY(p);
            const color = p === 80 ? 'rgba(224,85,85,0.25)' : p === 50 ? 'rgba(229,164,75,0.2)' : 'rgba(255,255,255,0.05)';
            return `<line x1="${PAD.l}" y1="${y.toFixed(1)}" x2="${PAD.l+cw}" y2="${y.toFixed(1)}" stroke="${color}" stroke-width="1"/>
                    <text x="${(PAD.l-4).toFixed(1)}" y="${(y+3).toFixed(1)}" text-anchor="end" fill="rgba(111,115,122,0.8)" font-size="8">${p}%</text>`;
        }).join('');

        // baseline
        const baseY = (PAD.t + ch).toFixed(1);
        const xAxis = `<line x1="${PAD.l}" y1="${baseY}" x2="${PAD.l+cw}" y2="${baseY}" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>`;

        // time-based x-axis ticks — sparse enough to not crowd
        // day → every 4 hours; week → every day; month → every 5 days
        const tickMs   = period === 'day' ? 4*3600e3 : period === 'week' ? 86400e3 : 5*86400e3;
        const tickFmt  = period === 'day'
            ? t => `${String(new Date(t).getHours()).padStart(2,'0')}:00`
            : t => new Date(t).toLocaleDateString('en-GB',{day:'numeric',month:'short'});
        // align first tick to a clean boundary
        const firstTick = Math.ceil(minT / tickMs) * tickMs;
        const xTicks = [];
        for (let t = firstTick; t <= maxT; t += tickMs) {
            const x = toX(t);
            xTicks.push(
                `<line x1="${x.toFixed(1)}" y1="${baseY}" x2="${x.toFixed(1)}" y2="${(PAD.t+ch+4).toFixed(1)}" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>` +
                `<text x="${x.toFixed(1)}" y="${(H-6).toFixed(1)}" text-anchor="middle" fill="rgba(111,115,122,0.8)" font-size="8">${tickFmt(t)}</text>`
            );
        }
        const xTicksSvg = xTicks.join('');

        // session data points
        const points = sessions.map(s => ({
            t: new Date(s.last_active).getTime(),
            pct: Math.min(100, Math.round((s.total_tokens||0) / CTX_MAX * 100))
        }));

        // colored line segments
        let polylines = '';
        for (let i = 1; i < points.length; i++) {
            const a = points[i-1], b = points[i];
            const stroke = b.pct > 80 ? '#e05555' : b.pct > 50 ? '#e5a44b' : '#56a37e';
            polylines += `<line x1="${toX(a.t).toFixed(1)}" y1="${toY(a.pct).toFixed(1)}" x2="${toX(b.t).toFixed(1)}" y2="${toY(b.pct).toFixed(1)}" stroke="${stroke}" stroke-width="1.5" stroke-linecap="round"/>`;
        }

        // area fill
        const areaPoints = points.map(p => `${toX(p.t).toFixed(1)},${toY(p.pct).toFixed(1)}`).join(' ');
        const latestPct  = points[points.length-1].pct;
        const areaColor  = latestPct > 80 ? 'rgba(224,85,85,0.08)' : latestPct > 50 ? 'rgba(229,164,75,0.08)' : 'rgba(86,163,126,0.08)';
        const area = `<polygon points="${areaPoints} ${toX(points[points.length-1].t).toFixed(1)},${baseY} ${toX(points[0].t).toFixed(1)},${baseY}" fill="${areaColor}"/>`;

        // dots
        const dots = points.map(p => {
            const stroke = p.pct > 80 ? '#e05555' : p.pct > 50 ? '#e5a44b' : '#56a37e';
            const lbl = new Date(p.t).toLocaleDateString('en-GB',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'});
            return `<circle cx="${toX(p.t).toFixed(1)}" cy="${toY(p.pct).toFixed(1)}" r="1.5" fill="${stroke}" opacity="0.9"><title>${lbl}: ${p.pct}% ctx</title></circle>`;
        }).join('');

        return `<div class="pressure-chart-wrap" style="margin-top:20px">
            <div class="pressure-chart-header">
                <span class="pressure-chart-title">Context usage over time</span>
                <span class="pressure-chart-meta">${sessions.length} sessions</span>
            </div>
            <div class="pressure-chart-body">
                <svg viewBox="0 0 ${W} ${H}" style="width:50%;display:block;margin:0 auto">
                    ${gridLines}${xAxis}${xTicksSvg}${area}${polylines}${dots}
                </svg>
            </div>
        </div>`;
    }

    let _insightsTotalTokens = 0, _insightsPeriod = 'week';

    function updateInsightsCost() {
        const c = _costCurrency, m = _costModel;
        const days = { day: 1, week: 7, month: 30 }[_insightsPeriod] || 7;
        const dailyTok   = _insightsTotalTokens / days;
        const monthlyTok = dailyTok * 30;
        const pEl = document.getElementById('ic-period-cost');
        const mEl = document.getElementById('ic-proj-monthly');
        const sEl = document.getElementById('ic-proj-sub');
        if (!pEl) return;
        pEl.textContent = fmtCost(tokCost(_insightsTotalTokens, m, c), c);
        mEl.textContent = fmtCost(tokCost(monthlyTok, m, c), c);
        if (sEl) sEl.textContent = `based on ${fmt(Math.round(dailyTok))} tok/day`;
    }

    function renderInsightsCost(totalTokens, period) {
        _insightsTotalTokens = totalTokens;
        _insightsPeriod      = period;
        const days        = { day: 1, week: 7, month: 30 }[period] || 7;
        const dailyTok    = totalTokens / days;
        const monthlyTok  = dailyTok * 30;
        const c = _costCurrency, m = _costModel;
        const periodLabel = { day: 'Last 24 hours', week: 'Last 7 days', month: 'Last 30 days' }[period];
        const modelOpts   = Object.keys(PRICING).map(k =>
            `<option value="${k}"${k === m ? ' selected' : ''}>${k}</option>`).join('');
        const curBtns     = ['EUR','GBP','USD'].map(cu =>
            `<button class="currency-btn${cu === c ? ' active' : ''}" onclick="setCurrencyInsights('${cu}')">${SYM[cu]}</button>`).join('');
        return `<div class="card" style="margin-top:20px">
            <div class="card-header">
                <span class="card-title">Cost estimation</span>
                <span class="card-badge">input tokens only</span>
            </div>
            <div class="cost-controls">
                <span class="cost-controls-label">Model</span>
                <select class="cost-model-select" onchange="setModelInsights(this.value)">${modelOpts}</select>
                <div class="currency-toggle">${curBtns}</div>
            </div>
            <div class="cost-grid" style="grid-template-columns:1fr 1fr">
                <div class="cost-box">
                    <div class="cost-val" id="ic-period-cost">${fmtCost(tokCost(totalTokens, m, c), c)}</div>
                    <div class="cost-label">${periodLabel}</div>
                    <div class="cost-sub">${fmt(totalTokens)} tokens</div>
                </div>
                <div class="cost-box">
                    <div class="cost-val" id="ic-proj-monthly">${fmtCost(tokCost(monthlyTok, m, c), c)}</div>
                    <div class="cost-label">Projected / month</div>
                    <div class="cost-sub" id="ic-proj-sub">based on ${fmt(Math.round(dailyTok))} tok/day</div>
                </div>
            </div>
        </div>`;
    }

    function setCurrencyInsights(cu) {
        _costCurrency = cu;
        document.querySelectorAll('.currency-btn').forEach(b => b.classList.toggle('active', b.textContent === SYM[cu]));
        updateCostValues();
        updateInsightsCost();
    }
    function setModelInsights(m) {
        _costModel = m;
        updateCostValues();
        updateInsightsCost();
    }

    function renderAnalytics(a, period) {
        const section = document.getElementById('analytics-section');
        if (!section) return;

        const peakHourStr = a.peak_hour !== null && a.peak_hour !== undefined
            ? `${String(a.peak_hour).padStart(2,'0')}:00`
            : '—';
        const pressureColor = a.avg_pressure_pct > 80 ? 'var(--warn)' : a.avg_pressure_pct > 50 ? 'var(--mid)' : 'var(--ok)';

        const statCards = `
            <div class="analytics-grid">
                <div class="stat-box">
                    <div class="stat-val">${fmt(a.total_tokens || 0)}</div>
                    <div class="stat-label">Total tokens</div>
                </div>
                <div class="stat-box">
                    <div class="stat-val">${a.session_count || 0}</div>
                    <div class="stat-label">Sessions</div>
                </div>
                <div class="stat-box">
                    <div class="stat-val" style="font-size:14px;padding-top:3px">${peakHourStr}</div>
                    <div class="stat-label">Busiest hour</div>
                </div>
                <div class="stat-box">
                    <div class="stat-val" style="color:${pressureColor}">${a.avg_pressure_pct || 0}%</div>
                    <div class="stat-label">Avg ctx pressure</div>
                </div>
            </div>`;

        section.innerHTML = statCards + renderInsightsCost(a.total_tokens || 0, period) + renderSessionTimeline(period);
    }

    function renderBurnersPie(rows) {
        const R = 44, SW = 13, CX = 60, CY = 60;
        const circ = 2 * Math.PI * R, GAP = 1.5;
        const grandTotal = rows.reduce((a, r) => a + r.total_tokens, 0) || 1;
        const top = rows.slice(0, 8);
        let offset = 0;
        const rings = top.map((r, i) => {
            const color = COLORS[i % COLORS.length];
            const frac  = r.total_tokens / grandTotal;
            const dash  = Math.max(0, frac * circ - GAP);
            const off   = -(offset * circ);
            offset += frac;
            return `<circle class="donut-slice" cx="${CX}" cy="${CY}" r="${R}" fill="none"
                stroke="${color}" stroke-width="${SW}"
                stroke-dasharray="${dash.toFixed(2)} ${circ.toFixed(2)}"
                stroke-dashoffset="${off.toFixed(2)}"
                style="animation-delay:${(i*0.04).toFixed(2)}s">
                <title>${r.label}: ${r.total_tokens.toLocaleString()} tok</title></circle>`;
        }).join('');
        const legend = top.map((r, i) => {
            const color = COLORS[i % COLORS.length];
            const pct   = (r.total_tokens / grandTotal * 100).toFixed(1);
            return `<div class="legend-item">
                <div class="legend-dot" style="background:${color}"></div>
                <div class="legend-label" title="${r.label}">${r.label}</div>
                <div class="legend-pct" style="color:${color}">${pct}%</div>
            </div>`;
        }).join('');
        return `<div class="chart-panel">
            <div class="donut-wrap">
                <svg viewBox="0 0 120 120" width="180" height="180" style="transform:rotate(-90deg);display:block">
                    <circle cx="${CX}" cy="${CY}" r="${R}" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="${SW}"/>
                    ${rings}
                </svg>
                <div class="donut-centre">
                    <div class="donut-total">${fmt(grandTotal)}</div>
                    <div class="donut-sub">tokens</div>
                </div>
            </div>
            <div class="donut-legend">${legend}</div>
        </div>`;
    }

    const _expandCache = {};

    function toggleBurnerExpand(idx, label, color, period) {
        const expandId = `bx-${idx}`;
        const chevId   = `bc-${idx}`;
        const el  = document.getElementById(expandId);
        const chv = document.getElementById(chevId);
        if (!el) return;

        const isOpen = el.classList.contains('open');
        if (isOpen) {
            el.classList.remove('open');
            if (chv) chv.classList.remove('open');
            return;
        }
        el.classList.add('open');
        if (chv) chv.classList.add('open');

        if (_expandCache[expandId]) { el.innerHTML = _expandCache[expandId]; return; }

        el.innerHTML = '<div style="padding:6px 12px 6px 28px;color:var(--muted);font-size:10px">loading…</div>';
        fetch(`/api/breakdown?raw_key=${encodeURIComponent(label)}&period=${encodeURIComponent(period)}`)
            .then(r => r.json())
            .then(data => {
                if (!data.items.length) {
                    el.innerHTML = '<div style="padding:6px 12px 6px 28px;color:var(--muted);font-size:10px">No breakdown available.</div>';
                    return;
                }
                const maxTok = Math.max(...data.items.map(d => d.total_tokens));
                const html = data.items.map(item => {
                    const barPct  = Math.round(item.total_tokens / maxTok * 100);
                    const dispLabel = data.type === 'component'
                        ? (item.label || '').split('/').pop() || item.label
                        : item.label;
                    const sub = data.type === 'group'
                        ? `${item.session_count} session${item.session_count !== 1 ? 's' : ''} · avg ${(item.avg_tokens||0).toLocaleString()} tok`
                        : fmtDate(item.last_active);
                    return `<div class="expand-row">
                        <div>
                            <div class="expand-label" title="${item.label}">${dispLabel}</div>
                            <div class="expand-sub">${sub}</div>
                        </div>
                        <div class="expand-bar"><div class="expand-bar-fill" style="width:${barPct}%;background:${color}"></div></div>
                        <div class="expand-tokens">${item.total_tokens.toLocaleString()} tok</div>
                    </div>`;
                }).join('');
                _expandCache[expandId] = html;
                el.innerHTML = html;
            })
            .catch(() => {
                el.innerHTML = '<div style="padding:6px 12px 6px 28px;color:var(--muted);font-size:10px">Failed to load.</div>';
            });
    }

    function renderBurnersList(rows, period) {
        const section = document.getElementById('burners-section');
        if (!section) return;
        if (!rows.length) {
            section.innerHTML = '<div class="empty-state"><div class="icon">◻</div><div>No data for this period.</div></div>';
            return;
        }
        const maxTok = rows[0].total_tokens;
        const pieHtml = renderBurnersPie(rows);
        const burnerRows = rows.map((r, i) => {
            const color    = COLORS[i % COLORS.length];
            const barPct   = Math.round(r.total_tokens / maxTok * 100);
            const clickable = r.is_group === 1;
            const safeKey  = (r.raw_key || '').replace(/\\/g, '\\\\').replace(/'/g, "\\'");
            const rowStyle = clickable ? '' : 'style="cursor:default"';
            const onclick  = clickable ? `onclick="toggleBurnerExpand(${i}, '${safeKey}', '${color}', '${period}')"` : '';
            const chevron  = clickable ? `<div class="burner-chevron" id="bc-${i}">▶</div>` : '<div></div>';
            const expand   = clickable ? `<div class="burner-expand" id="bx-${i}"></div>` : '';
            return `<div class="burner-row" ${rowStyle} ${onclick}>
                <div>
                    <div class="burner-label" title="${r.label}">${r.label}</div>
                    <div class="burner-sub">${r.session_count} session${r.session_count !== 1 ? 's' : ''} · avg ${r.avg_tokens.toLocaleString()} tok</div>
                </div>
                <div class="bar-wrap"><div class="bar-fill" style="width:${barPct}%;background:${color}"></div></div>
                <div class="burner-tokens">${r.total_tokens.toLocaleString()} tok</div>
                <div class="burner-pct" style="color:${color}">#${i+1}</div>
                ${chevron}
            </div>${expand}`;
        }).join('');
        section.innerHTML = `
            <div class="card">
                <div class="card-header">
                    <span class="card-title">Biggest context burners — ${PERIOD_LABEL[period] || period}</span>
                    <span class="card-badge">${rows.length} components</span>
                </div>
                <div class="card-body">
                    ${pieHtml}
                    ${burnerRows}
                </div>
            </div>`;
    }

    // ── API Key settings ──────────────────────────────────────────────────────────
    function toggleSettings() {
        const panel = document.getElementById('settings-panel');
        const btn   = document.getElementById('settings-btn');
        const open  = panel.classList.toggle('open');
        btn.classList.toggle('active', open);
        if (open) loadKeyStatus();
    }
    document.addEventListener('click', e => {
        if (!e.target.closest('#settings-panel') && !e.target.closest('#settings-btn'))
            document.getElementById('settings-panel').classList.remove('open'),
            document.getElementById('settings-btn').classList.remove('active');
    });

    function loadKeyStatus() {
        fetch('/api/config').then(r => r.json()).then(cfg => {
            const inp = document.getElementById('key-input');
            const rem = document.getElementById('remove-btn');
            const st  = document.getElementById('key-status');
            if (cfg.has_key) {
                inp.placeholder = cfg.masked_key;
                inp.value = '';
                rem.style.display = '';
                showStatus('ok', 'API key saved');
            } else {
                inp.placeholder = 'sk-ant-api03-…';
                rem.style.display = 'none';
                st.style.display = 'none';
            }
        }).catch(() => {});
    }

    function onKeyInput() {
        document.getElementById('key-status').style.display = 'none';
    }

    function toggleKeyVis() {
        const inp = document.getElementById('key-input');
        inp.type = inp.type === 'password' ? 'text' : 'password';
    }

    function showStatus(state, msg) {
        const el  = document.getElementById('key-status');
        const dot = state === 'ok' ? 'var(--ok)' : state === 'err' ? 'var(--warn)' : 'var(--muted)';
        el.style.display = 'flex';
        el.innerHTML = `<span class="key-status-dot" style="background:${dot}"></span><span style="color:var(--muted)">${msg}</span>`;
    }

    function saveKey() {
        const key = document.getElementById('key-input').value.trim();
        if (!key) { showStatus('err', 'Enter a key first'); return; }
        showStatus('muted', 'Saving…');
        fetch('/api/config', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({api_key: key}) })
            .then(r => r.json())
            .then(() => {
                document.getElementById('key-input').value = '';
                document.getElementById('remove-btn').style.display = '';
                showStatus('ok', 'Saved — click Test connection to verify');
            }).catch(() => showStatus('err', 'Failed to save'));
    }

    function testKey() {
        const btn = document.getElementById('test-btn');
        btn.textContent = 'Testing…'; btn.disabled = true;
        showStatus('muted', 'Connecting to Anthropic…');
        fetch('/api/config/validate', { method: 'POST' })
            .then(r => r.json())
            .then(d => {
                if (d.valid) showStatus('ok', `Connected · ${d.models ? d.models.length + ' models available' : 'valid key'}`);
                else showStatus('err', d.error || 'Invalid key');
            })
            .catch(() => showStatus('err', 'Network error'))
            .finally(() => { btn.textContent = 'Test connection'; btn.disabled = false; });
    }

    function removeKey() {
        fetch('/api/config', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({api_key: ''}) })
            .then(() => {
                document.getElementById('key-input').value = '';
                document.getElementById('key-input').placeholder = 'sk-ant-api03-…';
                document.getElementById('remove-btn').style.display = 'none';
                showStatus('muted', 'API key removed');
            }).catch(() => {});
    }

    loadKeyStatus();

    // ── Periodic refresh ──────────────────────────────────────────────────────────
    setInterval(() => {
        refreshSidebar();
        refreshStats();
    }, 10000);
</script>
